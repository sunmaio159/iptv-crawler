    # 精确排除的频道名（完全匹配）
    exclude-names:
      - "CCTV-4 Asia"
      - "CCTV-4 Europe"

  # 爬虫配置
  crawler:
    # 并发线程数（建议：4-8，根据网络和CPU调整）
    concurrency: 5
    # 最大重试次数
    max-retries: 3
    # 重试延迟（毫秒，指数退避）
    retry-delay-ms: 2000
    # 最低分辨率要求（1080p / 720p / 480p / 4k）
    min-resolution: 1080p
    # 无分辨率标注时的处理模式：conservative（丢弃）/ permissive（放行）
    resolution-filter-mode: conservative
    # 熔断器配置
    circuit-breaker:
      # 连续失败阈值，达到此值触发熔断
      failure-threshold: 5
      # 熔断后半开等待时间（毫秒）
      half-open-timeout-ms: 300000

  # 测速配置
  speedtest:
    # 第一轮快速检测：短超时，仅判断流是否可达
    quick-probe-seconds: 2
    # 第二轮详细测速：长超时，获取延迟+带宽
    max-probe-seconds: 6
    # 测速并发线程数（建议：2-4，ffmpeg消耗大）
    concurrency: 5
    # 延迟阈值（毫秒）：超过此值的频道在输出时排到末尾或过滤
    max-latency-ms: 3000
    # 低延迟优先：为true时输出按延迟升序排列
    low-latency-first: true

  # 指标配置
  metrics:
    # 指标保留时间（小时），0表示不清理
    retention-hours: 168  # 7天
    # 质量评分计算间隔（分钟）
    score-calculation-interval-minutes: 1440  # 每天

  # ffmpeg 配置
  ffmpeg:
    # ffmpeg 可执行文件路径，默认自动检测 PATH 中的 ffmpeg
    path: ffmpeg

  # 清理配置
  cleanup:
    # 清理 N 天未更新且不可用的频道，0 表示不清理
    retention-days: 30

